name: CI

on:
  push:
    branches: [main]
    paths:
      - "k8s_runbook_agent/**"
  pull_request:
    branches: [main]
    paths:
      - "k8s_runbook_agent/**"

jobs:
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install ruff mypy
          pip install -r k8s_runbook_agent/requirements.txt

      - name: Ruff check
        run: ruff check k8s_runbook_agent/ --select E,F,W --ignore E501

      - name: Ruff format check
        run: ruff format --check k8s_runbook_agent/

  test:
    name: Tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: k8s_agent_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://test:test@localhost:5432/k8s_agent_test
      ANTHROPIC_API_KEY: ""
      SLACK_BOT_TOKEN: ""
      SLACK_CHANNEL_ID: ""

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install -r k8s_runbook_agent/requirements.txt
          pip install pytest pytest-asyncio httpx

      - name: Run tests
        run: |
          cd k8s_runbook_agent
          python -m pytest tests/ -v --tb=short -x

  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: |
          cd k8s_runbook_agent
          docker build -t k8s-runbook-agent:ci-${{ github.sha }} .

      - name: Verify container starts
        run: |
          docker run -d --name agent-test \
            -e ANTHROPIC_API_KEY="" \
            -e SLACK_BOT_TOKEN="" \
            -e SLACK_CHANNEL_ID="" \
            -p 8080:8080 \
            k8s-runbook-agent:ci-${{ github.sha }}
          sleep 5
          curl -sf http://localhost:8080/health | grep -q '"ok"'
          docker stop agent-test

  validate-k8s:
    name: Validate K8s Manifests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install kubectl
        uses: azure/setup-kubectl@v4

      - name: Validate manifests (dry-run)
        run: |
          for f in k8s_runbook_agent/deploy/*.yaml; do
            echo "Validating $f..."
            kubectl apply --dry-run=client -f "$f" 2>&1 || true
          done
