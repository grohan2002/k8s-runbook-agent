apiVersion: apps/v1
kind: Deployment
metadata:
  name: k8s-runbook-agent
  namespace: k8s-runbook-agent
  labels:
    app.kubernetes.io/name: k8s-runbook-agent
    app.kubernetes.io/component: agent
spec:
  replicas: 1  # Single instance — agent uses in-memory session cache
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0  # Zero-downtime deploys
      maxSurge: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: k8s-runbook-agent
  template:
    metadata:
      labels:
        app.kubernetes.io/name: k8s-runbook-agent
        app.kubernetes.io/component: agent
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8080"
        prometheus.io/path: "/metrics"
    spec:
      serviceAccountName: k8s-runbook-agent
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: agent
          image: k8s-runbook-agent:latest  # REPLACE with your registry
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          envFrom:
            - configMapRef:
                name: k8s-runbook-agent-config
            - secretRef:
                name: k8s-runbook-agent-secrets
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 15
            timeoutSeconds: 3
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /ready
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          startupProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 3
            periodSeconds: 5
            failureThreshold: 10
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir:
            sizeLimit: 50Mi
      terminationGracePeriodSeconds: 30

---
apiVersion: v1
kind: Service
metadata:
  name: k8s-runbook-agent
  namespace: k8s-runbook-agent
  labels:
    app.kubernetes.io/name: k8s-runbook-agent
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: k8s-runbook-agent
  ports:
    - name: http
      port: 80
      targetPort: http
      protocol: TCP

---
# PodDisruptionBudget — ensure agent stays up during node drains
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: k8s-runbook-agent
  namespace: k8s-runbook-agent
  labels:
    app.kubernetes.io/name: k8s-runbook-agent
spec:
  minAvailable: 0  # Single replica — allow drain but restart quickly
  selector:
    matchLabels:
      app.kubernetes.io/name: k8s-runbook-agent

---
# NetworkPolicy — restrict egress to only what the agent needs
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: k8s-runbook-agent
  namespace: k8s-runbook-agent
  labels:
    app.kubernetes.io/name: k8s-runbook-agent
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: k8s-runbook-agent
  policyTypes:
    - Ingress
    - Egress
  ingress:
    # Allow inbound from Grafana webhook + Slack + Prometheus
    - ports:
        - port: 8080
          protocol: TCP
  egress:
    # DNS
    - ports:
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP
    # Kubernetes API server (typically 443)
    - ports:
        - port: 443
          protocol: TCP
        - port: 6443
          protocol: TCP
    # PostgreSQL
    - ports:
        - port: 5432
          protocol: TCP
    # Slack API (api.slack.com over HTTPS)
    - ports:
        - port: 443
          protocol: TCP
    # Anthropic API (api.anthropic.com over HTTPS)
    - ports:
        - port: 443
          protocol: TCP
