# Secrets template — populate with real values via:
#   kubectl create secret generic k8s-runbook-agent-secrets \
#     --from-literal=ANTHROPIC_API_KEY=sk-ant-... \
#     --from-literal=SLACK_BOT_TOKEN=xoxb-... \
#     --from-literal=SLACK_SIGNING_SECRET=... \
#     --from-literal=GRAFANA_WEBHOOK_SECRET=... \
#     --from-literal=DATABASE_URL=postgresql://... \
#     -n k8s-runbook-agent
#
# Or use ExternalSecrets / Sealed Secrets in production.
---
apiVersion: v1
kind: Secret
metadata:
  name: k8s-runbook-agent-secrets
  namespace: k8s-runbook-agent
  labels:
    app.kubernetes.io/name: k8s-runbook-agent
type: Opaque
stringData:
  ANTHROPIC_API_KEY: "REPLACE_ME"
  SLACK_BOT_TOKEN: "REPLACE_ME"
  SLACK_SIGNING_SECRET: "REPLACE_ME"
  GRAFANA_WEBHOOK_SECRET: "REPLACE_ME"
  DATABASE_URL: "REPLACE_ME"
