{{- if .Values.networkPolicy.enabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "k8s-runbook-agent.fullname" . }}
  labels:
    {{- include "k8s-runbook-agent.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "k8s-runbook-agent.selectorLabels" . | nindent 6 }}
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - ports:
        - port: 8080
          protocol: TCP
  egress:
    # DNS
    - ports:
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP
    # K8s API, Slack, Anthropic, PagerDuty, OpsGenie (HTTPS)
    - ports:
        - port: 443
          protocol: TCP
        - port: 6443
          protocol: TCP
    # PostgreSQL
    - ports:
        - port: 5432
          protocol: TCP
{{- end }}
