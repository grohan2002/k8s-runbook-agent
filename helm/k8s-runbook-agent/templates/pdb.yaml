{{- if .Values.podDisruptionBudget.enabled }}
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: {{ include "k8s-runbook-agent.fullname" . }}
  labels:
    {{- include "k8s-runbook-agent.labels" . | nindent 4 }}
spec:
  minAvailable: {{ .Values.podDisruptionBudget.minAvailable }}
  selector:
    matchLabels:
      {{- include "k8s-runbook-agent.selectorLabels" . | nindent 6 }}
{{- end }}
