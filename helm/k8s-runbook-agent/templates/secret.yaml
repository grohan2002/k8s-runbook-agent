{{- if not .Values.secrets.existingSecret }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "k8s-runbook-agent.fullname" . }}-secrets
  labels:
    {{- include "k8s-runbook-agent.labels" . | nindent 4 }}
type: Opaque
stringData:
  ANTHROPIC_API_KEY: {{ .Values.secrets.anthropicApiKey | quote }}
  SLACK_BOT_TOKEN: {{ .Values.secrets.slackBotToken | quote }}
  SLACK_SIGNING_SECRET: {{ .Values.secrets.slackSigningSecret | quote }}
  GRAFANA_WEBHOOK_SECRET: {{ .Values.secrets.grafanaWebhookSecret | quote }}
  DATABASE_URL: {{ .Values.secrets.databaseUrl | quote }}
  {{- if .Values.secrets.pagerdutyRoutingKey }}
  PAGERDUTY_ROUTING_KEY: {{ .Values.secrets.pagerdutyRoutingKey | quote }}
  {{- end }}
  {{- if .Values.secrets.pagerdutyApiKey }}
  PAGERDUTY_API_KEY: {{ .Values.secrets.pagerdutyApiKey | quote }}
  {{- end }}
  {{- if .Values.secrets.opsgenieApiKey }}
  OPSGENIE_API_KEY: {{ .Values.secrets.opsgenieApiKey | quote }}
  OPSGENIE_TEAM: {{ .Values.secrets.opsgenieTeam | quote }}
  OPSGENIE_REGION: {{ .Values.secrets.opsgenieRegion | quote }}
  {{- end }}
{{- end }}
